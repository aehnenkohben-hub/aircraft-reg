<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 1. META SECTION -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Aircraft Logger</title>
    
    <!-- 2. CSS SECTION -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f7;
            color: #1c1c1e;
        }
        h1 {
            color: #0066cc;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007aff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin: 10px 0;
            border: none;
            cursor: pointer;
        }
        .button.secondary {
            background-color: #e5e5ea;
            color: #000;
        }
        .button.edit {
            background-color: #34c759;
        }
        .button.delete {
            background-color: #ff3b30;
        }
        .button.details {
            background-color: #af52de;
        }
        .button.seen {
            background-color: #5ac8fa;
        }
        .button.inactive {
            background-color: #ff9500;
        }
        .button.export, .button.import {
            background-color: #ffcc00;
            color: #1c1c1e;
        }
        .button.random-review {
            background-color: #ff2d55;
            color: #fff;
        }
        form {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 80px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .checkbox-container input {
            width: auto;
            margin-right: 10px;
            margin-bottom: 0;
        }
        .radio-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .radio-container input {
            width: auto;
            margin-right: 10px;
        }
        .hidden {
            display: none;
        }
        #aircraftList, #inactiveAircraftList {
            margin-top: 30px;
        }
        .aircraft-item {
            background-color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            position: relative;
            padding-left: 120px;
        }
        .aircraft-current {
            font-size: 1.2em;
            margin-bottom: 5px;
        }
        .aircraft-seen {
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
            padding-left: 10px;
        }
        .aircraft-status {
            font-size: 0.9em;
            color: #ff9500;
            margin-bottom: 10px;
        }
        .aircraft-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .history-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .history-item input {
            flex: 1;
            margin-bottom: 0;
        }
        .history-actions {
            display: flex;
            gap: 5px;
        }
        .history-container {
            margin-bottom: 15px;
        }
        .history-title {
            font-weight: 500;
            margin-bottom: 8px;
        }
        .aircraft-details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .reg-format {
            text-transform: uppercase;
        }
        .current-reg-btn {
            background-color: #5856d6;
            padding: 5px 10px;
            font-size: 0.8em;
        }
        .last-known-btn {
            background-color: #5856d6;
            padding: 5px 10px;
            font-size: 0.8em;
        }
        .current-reg {
            font-weight: bold;
            color: #007aff;
        }
        .seen-reg {
            color: #5ac8fa;
        }
        .detail-item {
            margin-bottom: 8px;
        }
        .status-options {
            margin-left: 20px;
            margin-top: 10px;
        }
        .other-status-input {
            margin-top: 10px;
        }
        #landingPage {
            background: white;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 40px 30px 30px 30px;
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 420px;
        }
        #landingPage h1 {
            font-size: 2.3em;
            margin-bottom: 0.2em;
            color: #0066cc;
            letter-spacing: 1px;
        }
        #landingPage .welcome {
            font-size: 1.1em;
            color: #444;
            margin-bottom: 1.5em;
            text-align: center;
        }
        #landingPage .button {
            width: 100%;
            margin: 10px 0 0 0;
            font-size: 1.08em;
        }
        #landingPage .button:first-of-type {
            margin-top: 0;
        }
        /* Ryanair logo on right for Ryanair-operated aircraft */
        .airline-logo-box {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px;
            width: 80px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border: 1px solid #e0e0e0;
        }
        .airline-logo-left {
            position: static;
            top: unset;
            left: unset;
            height: 72px;
            width: auto;
            z-index: 2;
            transform: none;
            background: none;
            box-shadow: none;
            border: none;
        }
        .ryanair-logo-box {
            background: #1c3c83 !important;
            border: none !important;
        }
        .easyjet-logo-box {
            background: #ff6801 !important;
            border: none !important;
        }
        .jet2-logo-box { background: #db1915 !important; border: none !important; }
        .emirates-logo-box { background: #d61a21 !important; border: none !important; }
        .qatarairways-logo-box { background: #5f023b !important; border: none !important; }
        .sas-logo-box { background: #023df4 !important; border: none !important; }
        .loganair-logo-box { background: #e2241c !important; border: none !important; }
        .tui-logo-box { background: #6fcbf3 !important; border: none !important; }
        .norwegian-logo-box { background: #e5212d !important; border: none !important; }
        .wideroe-logo-box { background: #1f8227 !important; border: none !important; }
        .airbelgium-logo-box { background: #e73346 !important; border: none !important; }
        .klm-logo-box { background: #02a1de !important; border: none !important; }
        .latam-logo-box { background: #1c0186 !important; border: none !important; }
        .nordwind-logo-box { background: #cd1f2c !important; border: none !important; }
        .buzz-logo-box { background: #000000 !important; border: none !important; }
        .indigo-logo-box { background: #09009b !important; border: none !important; }
        .skyup-logo-box { background: #fb4c01 !important; border: none !important; }
        .turkishairlines-logo-box { background: #c80d10 !important; border: none !important; }
        .canadiannorth-logo-box { background: #c30030 !important; border: none !important; }
        .aircanada-logo-box { background: #000000 !important; border: none !important; }

        /* Custom backgrounds for new airlines */
        .southwest-logo-box { background: #1f3084 !important; border: none !important; }
        .dhl-logo-box { background: #ffcc01 !important; border: none !important; }
        .tuifly-logo-box { background: #6fcbf3 !important; border: none !important; }
        .skyairline-logo-box { background: #661f74 !important; border: none !important; }
        .skyairline-logo-box { background: #661f74 !important; border: none !important; }
    </style>
</head>

<body>
    <!-- 3. LANDING PAGE SECTION -->
    <div id="landingPage">
        <h1>Aircraft Logger</h1>
        <div class="welcome">Welcome! Log and track aircraft registrations you've spotted or flown on. Start by logging a new aircraft or viewing your log below.</div>
        <button class="button" id="logAircraftBtn">Log New Aircraft</button>
        <button class="button secondary" id="viewLogsBtn">View My Log</button>
        <button class="button inactive" id="viewInactiveBtn">View Inactive Aircraft</button>
        <button class="button export" id="exportBtn">Export Data</button>
        <button class="button import" id="importBtn">Import Data</button>
        <input type="file" id="importFileInput" accept="application/json" style="display:none;" />
        <button class="button random-review" id="randomReviewBtn">Random Review</button>
    </div>

    <!-- 4. LOG FORM SECTION -->
    <div id="logForm" class="hidden">
        <h2 id="formTitle">Log Aircraft</h2>
        <form id="aircraftForm">
            <input type="hidden" id="editIndex" value="-1">
            
            <label for="type">Aircraft Type:</label>
            <input type="text" id="type" required placeholder="e.g. A320-200">
            
            <div class="checkbox-container">
                <input type="checkbox" id="inService" checked>
                <label for="inService">Aircraft is still in service</label>
            </div>
            
            <div id="outOfServiceSection" class="hidden">
                <div class="status-options">
                    <div class="radio-container">
                        <input type="radio" id="statusStored" name="status" value="Stored">
                        <label for="statusStored">Stored</label>
                    </div>
                    <div class="radio-container">
                        <input type="radio" id="statusScrapped" name="status" value="Scrapped">
                        <label for="statusScrapped">Scrapped</label>
                    </div>
                    <div class="radio-container">
                        <input type="radio" id="statusWrittenOff" name="status" value="Written off">
                        <label for="statusWrittenOff">Written off</label>
                    </div>
                    <div class="radio-container">
                        <input type="radio" id="statusCrashed" name="status" value="Crashed">
                        <label for="statusCrashed">Crashed</label>
                    </div>
                    <div class="radio-container">
                        <input type="radio" id="statusOther" name="status" value="Other">
                        <label for="statusOther">Other</label>
                    </div>
                </div>
                <div id="otherStatusSection" class="hidden other-status-input">
                    <label for="outOfServiceNotes">Status details:</label>
                    <textarea id="outOfServiceNotes" placeholder="e.g. Crashed, Preserved, Converted, etc."></textarea>
                </div>
            </div>
            
            <div class="history-container" id="otherRegsSection">
                <div class="history-title">Registrations and Operators</div>
                <div id="historyItemsContainer"></div>
                <button type="button" class="button secondary" id="addHistoryBtn">Add Another Registration</button>
            </div>
            
            <div class="checkbox-container">
                <input type="checkbox" id="flown">
                <label for="flown">I have flown on this aircraft</label>
            </div>
            
            <div id="flightDetails" class="hidden">
                <div class="history-title">Trips Flown</div>
                <div id="tripsContainer"></div>
                <button type="button" class="button secondary" id="addTripBtn">Add Another Trip</button>
            </div>
            
            <div class="history-container" id="sightingsSection">
                <div class="history-title">Sightings</div>
                <div id="sightingsContainer"></div>
                <button type="button" class="button secondary" id="addSightingBtn">Add Another Sighting</button>
            </div>
            
            <div class="button-container">
                <button type="submit" class="button" id="saveBtn">Save Aircraft</button>
                <button type="button" class="button secondary" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </div>

    <!-- 5. ACTIVE AIRCRAFT LIST SECTION -->
    <div id="aircraftList" class="hidden">
        <h2>My Aircraft Log</h2>
        <button class="button" id="backToHomeBtn">Back to Home</button>
        <button class="button" id="addNewFromListBtn">Add New Aircraft</button>
        <button class="button inactive" id="viewInactiveFromListBtn">View Inactive Aircraft</button>
        <input type="text" id="registrationSearch" placeholder="Search by registration..." style="margin: 10px 0 10px 0; width: 60%; padding: 8px; border-radius: 8px; border: 1px solid #d1d1d6; font-size: 1em;" />
        <label for="sortFilter" style="margin-left:20px; font-weight:normal;">Sort by:</label>
        <select id="sortFilter">
            <option value="registration">Registration (A-Z)</option>
            <option value="airline">Airline (A-Z)</option>
        </select>
        <label style="margin-left:20px; font-weight:normal;"><input type="checkbox" id="flownOnlyFilter"> Only show aircraft I have flown</label>
        <!-- Remove import/export from aircraftList -->
        <button class="button" id="exportBtnList" style="display:none;"></button>
        <button class="button" id="importBtnList" style="display:none;"></button>
        <input type="file" id="importFileInputList" accept="application/json" style="display:none;" />
        <div id="aircraftEntries"></div>
    </div>

    <!-- 6. INACTIVE AIRCRAFT LIST SECTION -->
    <div id="inactiveAircraftList" class="hidden">
        <h2>Inactive Aircraft</h2>
        <button class="button" id="backFromInactiveBtn">Back to Home</button>
        <input type="text" id="inactiveRegistrationSearch" placeholder="Search by registration..." style="margin: 10px 0 10px 0; width: 60%; padding: 8px; border-radius: 8px; border: 1px solid #d1d1d6; font-size: 1em;" />
        <div id="inactiveAircraftEntries"></div>
    </div>

    <!-- 7. RANDOM REVIEW PAGE SECTION -->
    <div id="randomReviewPage" class="hidden">
        <h2>Random Aircraft Review</h2>
        <div id="randomReviewFormContainer"></div>
        <div class="button-container">
            <button class="button" id="nextRandomBtn">Next Random Aircraft</button>
            <button class="button secondary" id="exitRandomBtn">Exit Review</button>
        </div>
    </div>

    <!-- 7. JAVASCRIPT SECTION -->
    <script>
    // Helper to format date as DD/MM/YYYY
    function formatDateDMY(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear();
        return `${day}/${month}/${year}`;
    }
        // ========== DOM ELEMENTS ==========
        const landingPage = document.getElementById('landingPage');
        const logForm = document.getElementById('logForm');
        const aircraftList = document.getElementById('aircraftList');
        const inactiveAircraftList = document.getElementById('inactiveAircraftList');
        const logAircraftBtn = document.getElementById('logAircraftBtn');
        const viewLogsBtn = document.getElementById('viewLogsBtn');
        const viewInactiveBtn = document.getElementById('viewInactiveBtn');
        const viewInactiveFromListBtn = document.getElementById('viewInactiveFromListBtn');
        const backFromInactiveBtn = document.getElementById('backFromInactiveBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const backToHomeBtn = document.getElementById('backToHomeBtn');
        const addNewFromListBtn = document.getElementById('addNewFromListBtn');
        const aircraftForm = document.getElementById('aircraftForm');
        const inServiceCheckbox = document.getElementById('inService');
        const outOfServiceSection = document.getElementById('outOfServiceSection');
        const statusStored = document.getElementById('statusStored');
        const statusScrapped = document.getElementById('statusScrapped');
        const statusWrittenOff = document.getElementById('statusWrittenOff');
        const statusCrashed = document.getElementById('statusCrashed');
        const statusOther = document.getElementById('statusOther');
        const otherStatusSection = document.getElementById('otherStatusSection');
        const outOfServiceNotes = document.getElementById('outOfServiceNotes');
        const flownCheckbox = document.getElementById('flown');
        const flightDetails = document.getElementById('flightDetails');
        const aircraftEntries = document.getElementById('aircraftEntries');
        const inactiveAircraftEntries = document.getElementById('inactiveAircraftEntries');
        const formTitle = document.getElementById('formTitle');
        const saveBtn = document.getElementById('saveBtn');
        const editIndexInput = document.getElementById('editIndex');
        const historyItemsContainer = document.getElementById('historyItemsContainer');
        const addHistoryBtn = document.getElementById('addHistoryBtn');
        const addTripBtn = document.getElementById('addTripBtn');
        const tripsContainer = document.getElementById('tripsContainer');
        const addSightingBtn = document.getElementById('addSightingBtn');
        const sightingsContainer = document.getElementById('sightingsContainer');
        const sortFilter = document.getElementById('sortFilter');
        const importBtn = document.getElementById('importBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importFileInput = document.getElementById('importFileInput');
        const importBtnList = document.getElementById('importBtnList');
        const exportBtnList = document.getElementById('exportBtnList');
        const importFileInputList = document.getElementById('importFileInputList');
        const randomReviewBtn = document.getElementById('randomReviewBtn');
        const randomReviewPage = document.getElementById('randomReviewPage');
        const randomReviewFormContainer = document.getElementById('randomReviewFormContainer');
        const nextRandomBtn = document.getElementById('nextRandomBtn');
        const exitRandomBtn = document.getElementById('exitRandomBtn');
        
        // ========== DATA STORAGE ==========
        let aircraftData = [];
        
        // ========== INITIALIZATION FUNCTIONS ==========
        function init() {
            loadAircraftData();
            setupEventListeners();
            addHistoryItem('', '', true);
            addTripItem('', '', '', true);
            addSightingItem('', '', true);
        }
        
        function loadAircraftData() {
            const savedData = localStorage.getItem('aircraftData');
            if (savedData) {
                try {
                    aircraftData = JSON.parse(savedData) || [];
                    console.log("Loaded aircraft data:", aircraftData);
                } catch (e) {
                    console.error("Error parsing aircraft data:", e);
                    aircraftData = [];
                }
            }
        }
        
        function saveAircraftData() {
            localStorage.setItem('aircraftData', JSON.stringify(aircraftData));
        }
        
        // ========== EVENT LISTENERS SETUP ==========
        function setupEventListeners() {
            logAircraftBtn.addEventListener('click', showLogForm);
            viewLogsBtn.addEventListener('click', showAircraftList);
            viewInactiveBtn.addEventListener('click', showInactiveAircraftList);
            viewInactiveFromListBtn.addEventListener('click', showInactiveAircraftList);
            backFromInactiveBtn.addEventListener('click', showLandingPage);
            cancelBtn.addEventListener('click', showLandingPage);
            backToHomeBtn.addEventListener('click', showLandingPage);
            addNewFromListBtn.addEventListener('click', showLogForm);
            if (randomReviewBtn) randomReviewBtn.addEventListener('click', startRandomReview);
            if (nextRandomBtn) nextRandomBtn.addEventListener('click', showNextRandomAircraft);
            if (exitRandomBtn) exitRandomBtn.addEventListener('click', exitRandomReview);
            
            inServiceCheckbox.addEventListener('change', toggleOutOfServiceSection);
            
            statusStored.addEventListener('change', function() {
                if (this.checked) {
                    otherStatusSection.classList.add('hidden');
                }
            });
            statusScrapped.addEventListener('change', function() {
                if (this.checked) {
                    otherStatusSection.classList.add('hidden');
                }
            });
            statusWrittenOff.addEventListener('change', function() {
                if (this.checked) {
                    otherStatusSection.classList.add('hidden');
                }
            });
            statusCrashed.addEventListener('change', function() {
                if (this.checked) {
                    otherStatusSection.classList.add('hidden');
                }
            });
            statusOther.addEventListener('change', function() {
                if (this.checked) {
                    otherStatusSection.classList.remove('hidden');
                }
            });
            
            flownCheckbox.addEventListener('change', toggleFlightDetails);
            addHistoryBtn.addEventListener('click', () => addHistoryItem('', '', false));
            addTripBtn.addEventListener('click', () => addTripItem('', '', '', false));
            addSightingBtn.addEventListener('click', () => addSightingItem('', '', false));
            
            aircraftForm.addEventListener('submit', handleFormSubmit);
            
            const locationInput = document.getElementById('location');
            if (locationInput) locationInput.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
            const departureInput = document.getElementById('departure');
            if (departureInput) departureInput.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
            const arrivalInput = document.getElementById('arrival');
            if (arrivalInput) arrivalInput.addEventListener('input', function() { this.value = this.value.toUpperCase(); });
            // Import/Export event listeners
            if (exportBtn) exportBtn.addEventListener('click', exportData);
            if (importBtn) importBtn.addEventListener('click', () => importFileInput.click());
            if (importFileInput) importFileInput.addEventListener('change', handleImportFile);
            // Flown only filter event
            const flownOnlyCheckbox = document.getElementById('flownOnlyFilter');
            if (flownOnlyCheckbox) flownOnlyCheckbox.addEventListener('change', displayAircraftList);
            // Add event listener for sortFilter dropdown
            if (sortFilter) sortFilter.addEventListener('change', displayAircraftList);
            // Registration search event
            const registrationSearch = document.getElementById('registrationSearch');
            if (registrationSearch) registrationSearch.addEventListener('input', displayAircraftList);
            // Inactive registration search event
            const inactiveRegistrationSearch = document.getElementById('inactiveRegistrationSearch');
            if (inactiveRegistrationSearch) inactiveRegistrationSearch.addEventListener('input', displayInactiveAircraftList);
        }
        
        // ========== PAGE NAVIGATION FUNCTIONS ==========
        function showLandingPage() {
            landingPage.classList.remove('hidden');
            logForm.classList.add('hidden');
            aircraftList.classList.add('hidden');
            inactiveAircraftList.classList.add('hidden');
            randomReviewPage.classList.add('hidden'); // Hide random review page on landing
        }
        
        function showLogForm(isEdit = false) {
            landingPage.classList.add('hidden');
            logForm.classList.remove('hidden');
            aircraftList.classList.add('hidden');
            inactiveAircraftList.classList.add('hidden');
            randomReviewPage.classList.add('hidden'); // Hide random review page when showing log form
            formTitle.textContent = 'Log Aircraft';
            editIndexInput.value = -1;
            aircraftForm.reset();
            resetHistoryItems();
            resetTripItems();
            resetSightingItems();
            // Always start with a clean form for new or edit
            if (!isEdit) {
                addHistoryItem('', '', true);
                addTripItem('', '', '', true);
                addSightingItem('', '', true);
            }
        }
        
        function showAircraftList() {
            landingPage.classList.add('hidden');
            logForm.classList.add('hidden');
            aircraftList.classList.remove('hidden');
            inactiveAircraftList.classList.add('hidden');
            randomReviewPage.classList.add('hidden'); // Hide random review page when showing aircraft list
            // Set default sort to registration
            if (sortFilter) sortFilter.value = 'registration';
            displayAircraftList();
        }
        
        function showInactiveAircraftList() {
            landingPage.classList.add('hidden');
            logForm.classList.add('hidden');
            aircraftList.classList.add('hidden');
            inactiveAircraftList.classList.remove('hidden');
            randomReviewPage.classList.add('hidden'); // Hide random review page when showing inactive list
            displayInactiveAircraftList();
        }
        
        // ========== FORM HANDLING FUNCTIONS ==========
        function toggleOutOfServiceSection() {
            outOfServiceSection.classList.toggle('hidden', inServiceCheckbox.checked);
        }
        
        function toggleFlightDetails() {
            flightDetails.classList.toggle('hidden', !flownCheckbox.checked);
        }
        
        function addHistoryItem(registration, operator, isCurrent = false, isSeen = true) {
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            
            const isInService = inServiceCheckbox.checked;
            const buttonText = isInService ? 'Current' : 'Last Known';
            
            historyItem.innerHTML = `
                <input type="text" class="history-reg reg-format" placeholder="Registration" value="${registration}" required>
                <input type="text" class="history-operator" placeholder="Operator" value="${operator}">
                <div class="history-actions">
                    <button type="button" class="button ${isInService ? 'current-reg-btn' : 'last-known-btn'} set-current-btn">${buttonText}</button>
                    <button type="button" class="button seen set-seen-btn">Seen</button>
                    <button type="button" class="button delete remove-history-btn">×</button>
                </div>
                <input type="checkbox" class="current-reg-checkbox hidden" ${isCurrent ? 'checked' : ''}>
                <input type="checkbox" class="seen-checkbox hidden" ${isSeen ? 'checked' : ''}>
            `;
            
            historyItemsContainer.appendChild(historyItem);
            
            historyItem.querySelector('.history-reg').addEventListener('input', function() {
                this.value = this.value.toUpperCase();
            });
            
            historyItem.querySelector('.remove-history-btn').addEventListener('click', () => {
                if (document.querySelectorAll('.history-item').length > 1) {
                    historyItem.remove();
                } else {
                    alert("You must have at least one registration.");
                }
            });

        function getStatus(aircraft) {
            if (aircraft.inService) return null;
            if (aircraft.status === 'Stored') return 'Stored';
            if (aircraft.status === 'Scrapped') return 'Scrapped';
            if (aircraft.status === 'Written off') return 'Written off';
            if (aircraft.status === 'Crashed') return 'Crashed';
            if (aircraft.status === 'Other' && aircraft.outOfServiceNotes) {
                return aircraft.outOfServiceNotes;
            }
            return 'Not active';
        }
        
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const registrationItems = document.querySelectorAll('.history-item');
            if (registrationItems.length === 0) {
                alert("You must add at least one registration.");
                return;
            }
            
            const hasCurrent = Array.from(document.querySelectorAll('.current-reg-checkbox')).some(cb => cb.checked);
            if (!hasCurrent) {
                alert("You must mark one registration as Current/Last Known.");
                return;
            }
            
            const historyItems = [];
            let currentReg = '';
            let currentOperator = '';
            let currentIsSeen = false;
            const editIndex = parseInt(editIndexInput.value); // Declare only once here
            document.querySelectorAll('.history-item').forEach(item => {
                if (item.querySelector('.history-reg')) {
                    const reg = item.querySelector('.history-reg').value;
                    const operator = item.querySelector('.history-operator').value;
                    const isCurrent = item.querySelector('.current-reg-checkbox').checked;
                    const isSeen = item.querySelector('.seen-checkbox').checked;
                    
                    if (!reg) {
                        alert("All registrations must have a registration number.");
                        throw new Error("Missing registration");
                    }
                    
                    if (isCurrent) {
                        currentReg = reg;
                        currentOperator = operator || 'Unknown';
                        currentIsSeen = isSeen;
                    } else {
                        historyItems.push({
                            registration: reg,
                            operator: operator,
                            isCurrent: false,
                            isSeen: isSeen
                        });
                    }
                }
            });
            
            // Duplicate registration check (case-insensitive)
            const currentRegLower = currentReg.trim().toLowerCase();
            const duplicate = aircraftData.some((aircraft, idx) => {
                if (editIndex >= 0 && idx === editIndex) return false; // skip self if editing
                // Only check main registration for duplicates across aircraft
                return (aircraft.registration || '').trim().toLowerCase() === currentRegLower;
            });
            if (duplicate) {
                alert('Duplicate registration detected! This registration is already in your log.');
                return;
            }
            
            let status = null;
            let statusNotes = null;
            
            if (!inServiceCheckbox.checked) {
                if (statusStored.checked) {
                    status = 'Stored';
                } else if (statusScrapped.checked) {
                    status = 'Scrapped';
                } else if (statusWrittenOff && statusWrittenOff.checked) {
                    status = 'Written off';
                } else if (statusCrashed && statusCrashed.checked) {
                    status = 'Crashed';
                } else if (statusOther.checked) {
                    status = 'Other';
                    statusNotes = document.getElementById('outOfServiceNotes').value;
                }
            }
            
            // Gather trips
            let trips = [];
            if (flownCheckbox.checked) {
                document.querySelectorAll('#tripsContainer .history-item').forEach(item => {
                    const departure = item.querySelector('.trip-departure').value;
                    const arrival = item.querySelector('.trip-arrival').value;
                    const date = item.querySelector('.trip-date').value;
                    if (departure || arrival || date) {
                        trips.push({ departure, arrival, date });
                    }
                });
            }
            // Gather sightings
            let sightings = [];
            document.querySelectorAll('#sightingsContainer .history-item').forEach(item => {
                const location = item.querySelector('.sighting-location').value;
                const date = item.querySelector('.sighting-date').value;
                if (location || date) {
                    sightings.push({ location, date });
                }
            });
            
            const aircraft = {
                registration: currentReg,
                airline: currentOperator,
                type: document.getElementById('type').value,
                inService: inServiceCheckbox.checked,
                status: status,
                outOfServiceNotes: statusNotes,
                history: historyItems,
                currentIsSeen: currentIsSeen,
                flown: flownCheckbox.checked,
                trips: trips,
                sightings: sightings,
                loggedDate: new Date().toISOString()
            };
            
            if (editIndex >= 0) {
                aircraftData[editIndex] = aircraft;
            } else {
                aircraftData.push(aircraft);
            }
            
            saveAircraftData();
            alert('Aircraft saved successfully!');
            showLandingPage();
        }
        
        // ========== LIST DISPLAY FUNCTIONS ==========
        function displayAircraftList() {
            aircraftEntries.innerHTML = '';
            let activeAircraft = aircraftData.filter(aircraft => aircraft.inService);
            // Flown only filter
            const flownOnlyCheckbox = document.getElementById('flownOnlyFilter');
            if (flownOnlyCheckbox && flownOnlyCheckbox.checked) {
                activeAircraft = activeAircraft.filter(aircraft => aircraft.flown);
            }
            // Registration search filter
            const registrationSearch = document.getElementById('registrationSearch');
            if (registrationSearch && registrationSearch.value.trim() !== '') {
                const searchVal = registrationSearch.value.trim().toLowerCase();
                activeAircraft = activeAircraft.filter(aircraft => {
                    // Check current registration
                    if ((aircraft.registration || '').toLowerCase().includes(searchVal)) return true;
                    // Check all history registrations
                    if (Array.isArray(aircraft.history)) {
                        return aircraft.history.some(item => (item.registration || '').toLowerCase().includes(searchVal));
                    }
                    return false;
                });
            }
            // Sort by selected filter
            const sortBy = sortFilter.value;
            if (sortBy === 'airline') {
                // Gather all unique current operator names from all aircraft
                const allOperators = new Set();
                activeAircraft.forEach(aircraft => {
                    if (aircraft.airline) allOperators.add(aircraft.airline);
                });
                // Sort operator names
                const sortedOperators = Array.from(allOperators).sort((a, b) => a.localeCompare(b));
                sortedOperators.forEach(operator => {
                    // Sort aircraft by registration alphabetically within each operator
                    const groupAircraft = activeAircraft.filter(aircraft => aircraft.airline === operator)
                        .sort((a, b) => (a.registration || '').localeCompare(b.registration || ''));

                const searchVal = inactiveRegistrationSearch.value.trim().toLowerCase();

        // ========== CRUD OPERATIONS ==========
        function editAircraft(index) {
            showLogForm(true); // Move this to the top and pass true
            const aircraft = aircraftData[index];
            formTitle.textContent = 'Edit Aircraft';
            editIndexInput.value = index;
            saveBtn.textContent = 'Update Aircraft';
            // Fill basic info
            document.getElementById('type').value = aircraft.type || '';
            // Fill in-service status
            inServiceCheckbox.checked = aircraft.inService;
            toggleOutOfServiceSection();
            // Fill out-of-service details if applicable
            if (!aircraft.inService) {
                if (aircraft.status === 'Stored') {
                    statusStored.checked = true;
                } else if (aircraft.status === 'Scrapped') {
                    statusScrapped.checked = true;
                } else if (aircraft.status === 'Written off') {
                    statusWrittenOff.checked = true;
                } else if (aircraft.status === 'Crashed') {
                    statusCrashed.checked = true;
                } else if (aircraft.status === 'Other') {
                    statusOther.checked = true;
                    otherStatusSection.classList.remove('hidden');
                    document.getElementById('outOfServiceNotes').value = aircraft.outOfServiceNotes || '';
                }
            }
            // Reset and fill registration history
            resetHistoryItems();
            let hasCurrent = false;
            if (aircraft.history?.length > 0) {
                aircraft.history.forEach(item => {
                    addHistoryItem(item.registration, item.operator, !!item.isCurrent, !!item.isSeen);
                    if (item.isCurrent) hasCurrent = true;
                });
            }
            // If no current found in history, use the main registration
            if (!hasCurrent) {
                addHistoryItem(aircraft.registration, aircraft.airline, true, !!aircraft.currentIsSeen);
            }
            // Fill trips
            resetTripItems();
            if (aircraft.flown && aircraft.trips && aircraft.trips.length > 0) {
                aircraft.trips.forEach((trip, i) => {
                    addTripItem(trip.departure, trip.arrival, trip.date, i === 0);
                });
            } else if (aircraft.flown) {
                addTripItem('', '', '', true);
            }
            // Fill sightings
            resetSightingItems();
            if (aircraft.sightings && aircraft.sightings.length > 0) {
                aircraft.sightings.forEach((sighting, i) => {
                    addSightingItem(sighting.location, sighting.date, i === 0);
                });
            } else {
                addSightingItem('', '', true);
            }
            // Fill flight details if flown
            flownCheckbox.checked = aircraft.flown;
            toggleFlightDetails();
        }
        
        function deleteAircraft(index) {
            aircraftData.splice(index, 1);

            if (aircraftList.classList.contains('hidden')) {
                displayInactiveAircraftList();

        function exportData() {
            const dataStr = JSON.stringify(aircraftData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'aircraft_log.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        function handleImportFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (!Array.isArray(importedData)) throw new Error('Invalid data format');
                    aircraftData = importedData;
                    saveAircraftData();
                    alert('Data imported successfully!');
                    showLandingPage();
                } catch (err) {
                    alert('Failed to import data: ' + err.message);
                }
            };
            reader.readAsText(file);
            // Reset the input so the same file can be imported again if needed
            e.target.value = '';
        }
        
        // ========== RANDOM REVIEW FUNCTIONS ==========
        let randomReviewOrder = [];
        let randomReviewIndex = 0;
        function startRandomReview() {
            // Only include aircraft that are in service, stored, or marked as 'Other', but NOT scrapped
            const eligibleAircraft = aircraftData.filter(aircraft => {
                if (aircraft.inService) return true;
                if (aircraft.status === 'Stored') return true;
                if (aircraft.status === 'Other') return true;
                return false; // Exclude scrapped and any others
            });
            if (!eligibleAircraft.length) {
                alert('No eligible aircraft in your log to review!');
                return;
            }
            // Shuffle indices for random order
            randomReviewOrder = eligibleAircraft.map((_, i) => i);
            for (let i = randomReviewOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [randomReviewOrder[i], randomReviewOrder[j]] = [randomReviewOrder[j], randomReviewOrder[i]];
            }
            randomReviewIndex = 0;
            // Store eligible aircraft for this session
            window._randomReviewEligibleAircraft = eligibleAircraft;
            showRandomReviewPage();
            showRandomAircraftForReview();
        }
        function showRandomReviewPage() {
            landingPage.classList.add('hidden');
            logForm.classList.add('hidden');
            aircraftList.classList.add('hidden');
            inactiveAircraftList.classList.add('hidden');
            randomReviewPage.classList.remove('hidden');
        }
        function showRandomAircraftForReview() {
            const eligibleAircraft = window._randomReviewEligibleAircraft;
            if (randomReviewIndex >= randomReviewOrder.length) {
                alert('All aircraft reviewed! Returning to home.');
                exitRandomReview();
                return;
            }
            const idx = randomReviewOrder[randomReviewIndex];
            // Render the edit form for this aircraft inside randomReviewFormContainer
            renderEditFormInContainer(idx, randomReviewFormContainer, eligibleAircraft);
        }
        function showNextRandomAircraft() {
            // Save any edits before moving on
            const form = randomReviewFormContainer.querySelector('form');
            if (form) {
                form.dispatchEvent(new Event('submit', {cancelable: true, bubbles: true}));
            }
            randomReviewIndex++;
            showRandomAircraftForReview();
        }
        function exitRandomReview() {
            randomReviewPage.classList.add('hidden');
            showLandingPage();
        }
        // Helper to render the edit form for a given aircraft index inside a container
        function renderEditFormInContainer(index, container, eligibleAircraftOverride) {
            // Clone the log form HTML
            container.innerHTML = '';
            // Create a wrapper div
            const wrapper = document.createElement('div');
            wrapper.innerHTML = logForm.innerHTML;
            // Remove Save/Cancel, add Save only
            const btnContainer = wrapper.querySelector('.button-container');
            if (btnContainer) {
                btnContainer.innerHTML = '<button type="submit" class="button">Save Changes</button>';
            }
            // Replace IDs with unique ones to avoid conflicts
            wrapper.querySelectorAll('[id]').forEach(el => {
                el.id = el.id + '_random';
            });
            // Insert into container
            container.appendChild(wrapper);
            // Fill form with aircraft data
            fillRandomReviewForm(index, wrapper, eligibleAircraftOverride);
            // Add submit handler
            const form = wrapper.querySelector('form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveRandomReviewForm(index, wrapper, eligibleAircraftOverride);
                    alert('Aircraft updated!');
                });
            }
            // Attach all necessary event listeners for full edit functionality
            attachRandomReviewEventListeners(wrapper);

        // Fill the random review form with aircraft data
        function fillRandomReviewForm(index, wrapper, eligibleAircraftOverride) {
            const eligibleAircraft = eligibleAircraftOverride || window._randomReviewEligibleAircraft;
            const aircraft = eligibleAircraft[index];
            // Fill fields (use _random IDs)
            wrapper.querySelector('#type_random').value = aircraft.type || '';
            wrapper.querySelector('#inService_random').checked = aircraft.inService;
            // Out of service
            const outOfServiceSection = wrapper.querySelector('#outOfServiceSection_random');
            if (aircraft.inService) {
                outOfServiceSection.classList.add('hidden');
            } else {
                outOfServiceSection.classList.remove('hidden');
                if (aircraft.status === 'Stored') wrapper.querySelector('#statusStored_random').checked = true;
                else if (aircraft.status === 'Scrapped') wrapper.querySelector('#statusScrapped_random').checked = true;
                else if (aircraft.status === 'Written off') wrapper.querySelector('#statusWrittenOff_random').checked = true;
                else if (aircraft.status === 'Crashed') wrapper.querySelector('#statusCrashed_random').checked = true;
                else if (aircraft.status === 'Other') {
                    wrapper.querySelector('#statusOther_random').checked = true;
                    wrapper.querySelector('#otherStatusSection_random').classList.remove('hidden');
                    wrapper.querySelector('#outOfServiceNotes_random').value = aircraft.outOfServiceNotes || '';
                }
            }
            // Registration history
            const historyItemsContainer = wrapper.querySelector('#historyItemsContainer_random');
            historyItemsContainer.innerHTML = '';
            // Always ensure the main registration is present as current
            let hasCurrent = false;
            if (aircraft.history?.length > 0) {
                const currentInHistory = aircraft.history.find(item => item.isCurrent);
                if (currentInHistory) {
                    addHistoryItemRandom(currentInHistory.registration, currentInHistory.operator, true, !!currentInHistory.isSeen, wrapper);
                    hasCurrent = true;
                }
            }
            if (!hasCurrent) {
                addHistoryItemRandom(aircraft.registration, aircraft.airline, true, !!aircraft.currentIsSeen, wrapper);
            }
            if (aircraft.history?.length > 0) {
                aircraft.history.forEach(item => {
                    if (!item.isCurrent) {
                        addHistoryItemRandom(item.registration, item.operator, false, !!item.isSeen, wrapper);
                    }
                });
            }
            // Trips
            const tripsContainer = wrapper.querySelector('#tripsContainer_random');
            tripsContainer.innerHTML = '';
            if (aircraft.flown && aircraft.trips && aircraft.trips.length > 0) {
                aircraft.trips.forEach((trip, i) => {
                    addTripItemRandom(trip.departure, trip.arrival, trip.date, i === 0, wrapper);
                });
            } else if (aircraft.flown) {
                addTripItemRandom('', '', '', true, wrapper);
            }
            // Sightings
            const sightingsContainer = wrapper.querySelector('#sightingsContainer_random');
            sightingsContainer.innerHTML = '';
            if (aircraft.sightings && aircraft.sightings.length > 0) {
                aircraft.sightings.forEach((sighting, i) => {
                    addSightingItemRandom(sighting.location, sighting.date, i === 0, wrapper);
                });
            } else {
                addSightingItemRandom('', '', true, wrapper);
            }
            // Flown
            wrapper.querySelector('#flown_random').checked = aircraft.flown;
            // Show/hide flight details
            const flightDetails = wrapper.querySelector('#flightDetails_random');
            flightDetails.classList.toggle('hidden', !aircraft.flown);
        }
        // Save the random review form data back to aircraftData
        function saveRandomReviewForm(index, wrapper, eligibleAircraftOverride) {
            // Similar to handleFormSubmit, but for the random form
            const historyItems = [];
            let currentReg = '';
            let currentOperator = '';
            wrapper.querySelectorAll('.history-item').forEach(item => {
                if (item.querySelector('.history-reg')) {
                    const reg = item.querySelector('.history-reg').value;
                    const operator = item.querySelector('.history-operator').value;
                    const isCurrent = item.querySelector('.current-reg-checkbox').checked;
                    const isSeen = item.querySelector('.seen-checkbox').checked;
                    if (!reg) {
                        alert("All registrations must have a registration number.");
                        throw new Error("Missing registration");
                    }
                    if (isCurrent) {
                        currentReg = reg;
                        currentOperator = operator || 'Unknown';
                    } else {
                        historyItems.push({
                            registration: reg,
                            operator: operator,
                            isCurrent: false,
                            isSeen: isSeen
                        });
                    }
                }
            });
            let status = null;
            let statusNotes = null;
            if (!wrapper.querySelector('#inService_random').checked) {
                if (wrapper.querySelector('#statusStored_random').checked) {
                    status = 'Stored';
                } else if (wrapper.querySelector('#statusScrapped_random').checked) {
                    status = 'Scrapped';
                } else if (wrapper.querySelector('#statusWrittenOff_random') && wrapper.querySelector('#statusWrittenOff_random').checked) {
                    status = 'Written off';
                } else if (wrapper.querySelector('#statusCrashed_random') && wrapper.querySelector('#statusCrashed_random').checked) {
                    status = 'Crashed';
                } else if (wrapper.querySelector('#statusOther_random').checked) {
                    status = 'Other';
                    statusNotes = wrapper.querySelector('#outOfServiceNotes_random').value;
                }
            }
            // Gather trips
            let trips = [];
            if (wrapper.querySelector('#flown_random').checked) {
                wrapper.querySelectorAll('#tripsContainer_random .history-item').forEach(item => {
                    const departure = item.querySelector('.trip-departure').value;
                    const arrival = item.querySelector('.trip-arrival').value;
                    const date = item.querySelector('.trip-date').value;
                    if (departure || arrival || date) {
                        trips.push({ departure, arrival, date });
                    }
                });
            }
            // Gather sightings
            let sightings = [];
            wrapper.querySelectorAll('#sightingsContainer_random .history-item').forEach(item => {
                const location = item.querySelector('.sighting-location').value;
                const date = item.querySelector('.sighting-date').value;
                if (location || date) {
                    sightings.push({ location, date });
                }
            });
            const aircraft = {
                registration: currentReg,
                airline: currentOperator,
                type: wrapper.querySelector('#type_random').value,
                inService: wrapper.querySelector('#inService_random').checked,
                status: status,
                outOfServiceNotes: statusNotes,
                history: historyItems,
                currentIsSeen: wrapper.querySelector('.current-reg-checkbox').checked, // Store the current seen status
                flown: wrapper.querySelector('#flown_random').checked,
                trips: trips,
                sightings: sightings,
                loggedDate: new Date().toISOString()
            };
            aircraftData[index] = aircraft;
            saveAircraftData();
        }
        // Helper functions for random review form (addHistoryItem, addTripItem, addSightingItem)
        function addHistoryItemRandom(registration, operator, isCurrent, isSeen, wrapper) {
            const historyItemsContainer = wrapper.querySelector('#historyItemsContainer_random');
            const isInService = wrapper.querySelector('#inService_random').checked;
            const buttonText = isInService ? 'Current' : 'Last Known';
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <input type="text" class="history-reg reg-format" placeholder="Registration" value="${registration}" required>
                <input type="text" class="history-operator" placeholder="Operator" value="${operator}">
                <div class="history-actions">
                    <button type="button" class="button ${isInService ? 'current-reg-btn' : 'last-known-btn'} set-current-btn">${buttonText}</button>
                    <button type="button" class="button seen set-seen-btn">Seen</button>
                    <button type="button" class="button delete remove-history-btn">×</button>
                </div>
                <input type="checkbox" class="current-reg-checkbox hidden" ${isCurrent ? 'checked' : ''}>
                <input type="checkbox" class="seen-checkbox hidden" ${isSeen ? 'checked' : ''}>
            `;
            historyItemsContainer.appendChild(historyItem);
            historyItem.querySelector('.history-reg').addEventListener('input', function() {
                this.value = this.value.toUpperCase();
            });
            historyItem.querySelector('.remove-history-btn').addEventListener('click', () => {
                if (wrapper.querySelectorAll('.history-item').length > 1) {
                    historyItem.remove();
                } else {
                    alert("You must have at least one registration.");
                }
            });
            historyItem.querySelector('.set-current-btn').addEventListener('click', function() {
                wrapper.querySelectorAll('.current-reg-checkbox').forEach(cb => {
                    cb.checked = false;
                });
                historyItem.querySelector('.current-reg-checkbox').checked = true;
                wrapper.querySelectorAll('.set-current-btn').forEach(btn => {
                    const isService = wrapper.querySelector('#inService_random').checked;
                    btn.textContent = isService ? 'Current' : 'Last Known';
                    btn.style.backgroundColor = '#5856d6';
                });
                this.textContent = `✓ ${buttonText}`;
                this.style.backgroundColor = '#34c759';
            });
            historyItem.querySelector('.set-seen-btn').addEventListener('click', function() {
                const seenCheckbox = historyItem.querySelector('.seen-checkbox');
                seenCheckbox.checked = !seenCheckbox.checked;
                if (seenCheckbox.checked) {
                    this.style.backgroundColor = '#5ac8fa';
                    this.textContent = '✓ Seen';
                } else {
                    this.style.backgroundColor = '#5ac8fa';
                    this.textContent = 'Seen';
                }
            });
            if (isCurrent) {
                historyItem.querySelector('.set-current-btn').textContent = `✓ ${buttonText}`;
                historyItem.querySelector('.set-current-btn').style.backgroundColor = '#34c759';
            }
            historyItem.querySelector('.set-seen-btn').style.backgroundColor = '#5ac8fa';
            historyItem.querySelector('.set-seen-btn').textContent = isSeen ? '✓ Seen' : 'Seen';

                <input type="date" class="sighting-date" value="${date}">
                <div class="history-actions">
                    <button type="button" class="button delete remove-sighting-btn">×</button>
                </div>
            `;
            sightingsContainer.appendChild(sightingItem);
            sightingItem.querySelector('.sighting-location').addEventListener('input', function() {
                this.value = this.value.toUpperCase();
            });
            sightingItem.querySelector('.remove-sighting-btn').addEventListener('click', () => {
                if (wrapper.querySelectorAll('#sightingsContainer_random .history-item').length > 1 || !isFirst) {
                    sightingItem.remove();
                } else {
                    alert("You must have at least one sighting.");
                }
            });
        }

        // --- Airline normalization helper ---
        function normalizeAirlineName(name) {
            if (!name) return '';
            let n = name.trim().toLowerCase();
            if (n === 'tap air portugal' || n === 'tap - air portugal' || n === 'tap portugal') return 'tap air portugal';
            if (n === 'tuifly' || n === 'tui fly' || n === 'tui') return 'tuifly';
            if (n === 'sky airline' || n === 'sky airlines') return 'sky airline';
            return n;
        }
